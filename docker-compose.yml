version: '3.8'

services:
  slopblock:
    build: .
    ports:
      - "8083:8083"
    environment:
      - NODE_ENV=production
      - TRANSFORMERS_CACHE=/app/.cache
    volumes:
      - model-cache:/app/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/status"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  model-cache:
